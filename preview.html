<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Base64 Tool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #1e1e22;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.app {
    width: 400px;
    max-width: 100vw;
    min-height: 700px;
    background: #1a1a1e;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* === LOGIN SCREEN === */
.screen {
    display: none;
    flex-direction: column;
    padding: 60px 30px 30px;
    min-height: 700px;
}

.screen.active { display: flex; }

.logo {
    text-align: center;
    margin-bottom: 8px;
}
.logo-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #4a8cf7, #6c63ff);
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(74,140,247,0.3);
}

.app-title {
    font-size: 32px;
    font-weight: 700;
    text-align: center;
    color: #f0f0f5;
}

.app-subtitle {
    font-size: 14px;
    color: #8888aa;
    text-align: center;
    margin-bottom: 40px;
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    font-size: 12px;
    color: #8888aa;
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.form-group input {
    width: 100%;
    padding: 14px 16px;
    background: #25252b;
    border: 1px solid #333;
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border 0.2s;
}
.form-group input:focus {
    border-color: #4a8cf7;
}
.form-group input::placeholder {
    color: #555;
}

.btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
    background: linear-gradient(135deg, #4a8cf7, #6c63ff);
    color: #fff;
    margin-top: 8px;
    box-shadow: 0 4px 16px rgba(74,140,247,0.25);
}

.btn-primary:hover {
    box-shadow: 0 6px 24px rgba(74,140,247,0.35);
}

.btn-danger {
    background: #e04040;
    color: #fff;
    width: auto;
    padding: 8px 20px;
    font-size: 13px;
    border-radius: 8px;
}
.btn-danger:hover { background: #c03030; }

.btn-outline {
    background: transparent;
    color: #aaa;
    border: 1px solid #333;
    width: auto;
    padding: 10px 20px;
    font-size: 13px;
    border-radius: 8px;
}
.btn-outline:hover { border-color: #555; color: #fff; }

.btn-secondary {
    background: #2a2a30;
    color: #ccc;
    margin-top: auto;
}
.btn-secondary:hover { background: #333; }

.error-msg {
    color: #ff4444;
    font-size: 13px;
    text-align: center;
    margin-top: 12px;
    min-height: 20px;
}

/* === MAIN SCREEN === */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    margin-bottom: 20px;
    border-bottom: 1px solid #222;
}

.topbar-title {
    font-size: 18px;
    font-weight: 600;
    color: #f0f0f5;
}

.tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
}

.tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 10px;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    color: #888;
    background: #25252b;
}
.tab.active {
    background: linear-gradient(135deg, #4a8cf7, #6c63ff);
    color: #fff;
    box-shadow: 0 4px 12px rgba(74,140,247,0.2);
}

.input-label {
    font-size: 13px;
    color: #8888aa;
    margin-bottom: 8px;
    font-weight: 500;
}

textarea {
    width: 100%;
    padding: 14px;
    background: #25252b;
    border: 1px solid #333;
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-family: monospace;
    resize: vertical;
    min-height: 70px;
    outline: none;
}
textarea:focus { border-color: #4a8cf7; }
textarea::placeholder { color: #555; }

textarea.output {
    background: #1f1f24;
    border-color: #2a2a30;
    color: #4cdf8b;
    min-height: 60px;
}

.result-label {
    font-size: 13px;
    color: #8888aa;
    margin: 16px 0 8px;
    font-weight: 500;
}

.copy-msg {
    font-size: 13px;
    color: #4cdf8b;
    text-align: center;
    margin-top: 8px;
    min-height: 20px;
}
</style>
</head>
<body>

<div class="app">

<!-- LOGIN SCREEN -->
<div class="screen active" id="loginScreen">
    <div class="logo">
        <div class="logo-icon">B</div>
    </div>
    <div class="app-title">Base64 Tool</div>
    <div class="app-subtitle">Lütfen giriş yapın</div>

    <div class="form-group">
        <label>Kullanıcı Adı</label>
        <input type="text" id="username" placeholder="Kullanıcı adı" autocomplete="off">
    </div>

    <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="password" placeholder="Şifre">
    </div>

    <button class="btn btn-primary" onclick="login()">GİRİŞ YAP</button>
    <div class="error-msg" id="loginError"></div>
</div>

<!-- MAIN SCREEN -->
<div class="screen" id="mainScreen">
    <div class="topbar">
        <div class="topbar-title">Base64 Tool</div>
        <button class="btn btn-danger" onclick="logout()">Çıkış</button>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="setMode('encode')" id="tabEncode">Şifrele</button>
        <button class="tab" onclick="setMode('decode')" id="tabDecode">Çöz</button>
    </div>

    <div class="input-label" id="inputLabel">Telefon numarasını girin:</div>
    <textarea id="inputField" placeholder="Örnek: 905551234567"></textarea>

    <button class="btn btn-primary" onclick="process()" id="actionBtn" style="margin-top:14px">ŞİFRELE</button>

    <div class="result-label">Sonuç:</div>
    <textarea class="output" id="outputField" readonly placeholder="Sonuç burada görünecek"></textarea>

    <button class="btn btn-secondary" onclick="copyResult()" style="margin-top:6px">SONUCU KOPYALA</button>
    <div class="copy-msg" id="copyMsg"></div>
</div>

</div>

<script>
const USERS = { admin: "1234" };

function login() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();
    const err = document.getElementById('loginError');

    if (!user || !pass) {
        err.textContent = 'Kullanıcı adı ve şifre girin!';
        return;
    }

    if (USERS[user] && USERS[user] === pass) {
        err.textContent = '';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('mainScreen').classList.add('active');
    } else {
        err.textContent = 'Hatalı kullanıcı adı veya şifre!';
    }
}

function logout() {
    document.getElementById('mainScreen').classList.remove('active');
    document.getElementById('loginScreen').classList.add('active');
}

let currentMode = 'encode';

function setMode(mode) {
    currentMode = mode;
    document.getElementById('tabEncode').className = mode === 'encode' ? 'tab active' : 'tab';
    document.getElementById('tabDecode').className = mode === 'decode' ? 'tab active' : 'tab';
    document.getElementById('actionBtn').textContent = mode === 'encode' ? 'ŞİFRELE' : 'ÇÖZ';
    document.getElementById('inputLabel').textContent = mode === 'encode' ? 'Telefon numarasını girin:' : 'Base64 kodunu girin:';
    document.getElementById('inputField').placeholder = mode === 'encode' ? 'Örnek: 905551234567' : 'Base64 veriyi girin';
    document.getElementById('outputField').value = '';
    document.getElementById('copyMsg').textContent = '';
}

function process() {
    const input = document.getElementById('inputField').value.trim();
    const output = document.getElementById('outputField');
    document.getElementById('copyMsg').textContent = '';

    if (!input) {
        output.value = '[HATA] Lütfen veri girin!';
        return;
    }

    try {
        if (currentMode === 'encode') {
            output.value = btoa(input);
        } else {
            output.value = atob(input);
        }
    } catch (e) {
        output.value = '[HATA] Geçersiz veri!';
    }
}

function copyResult() {
    const text = document.getElementById('outputField').value;
    if (!text || text.startsWith('[HATA]')) {
        document.getElementById('copyMsg').textContent = 'Kopyalanacak veri yok';
        return;
    }
    navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copyMsg').textContent = 'Kopyalandı!';
    });
}

document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
});
document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
});
document.getElementById('inputField').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); process(); }
});
</script>

</body>
</html>
